name: 🧪 Run Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false

      matrix:
        config:
          - Release
          - Debug

        os:
          - macos-15-intel
          - macos-latest

        include:
          - os: ubuntu-latest
            config: Release
            container: ghcr.io/viennatools/vienna-builder:suite
          - os: ubuntu-latest
            config: Debug
            container: ghcr.io/viennatools/vienna-builder:suite
          - os: windows-latest
            config: Release+Debug

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    env:
      VCPKG_COMMIT: 72d876b20f06129a1b1e0db80c7075fe3e419d7c
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache

    name: "🧪 Test on ${{ matrix.os }} (⚙️: ${{ matrix.config }}, 💿: ${{ matrix.container || matrix.os }})"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🖥️ Setup Environment
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: 🔗 Prepare ViennaLS source
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          VIENNALS_TAG=$(awk '/NAME ViennaLS/{f=1} f && /GIT_TAG/{print $2; exit}' CMakeLists.txt)
          if ! git ls-remote --tags --exit-code https://github.com/ViennaTools/ViennaLS.git "$VIENNALS_TAG" > /dev/null 2>&1; then
            echo "[CI] Tag $VIENNALS_TAG not found; cloning master as fallback"
            rm -rf _viennals
            git clone --depth 1 --branch master https://github.com/ViennaTools/ViennaLS.git _viennals
            echo "CPM_ViennaLS_SOURCE=$(pwd)/_viennals" >> "$GITHUB_ENV"
          fi

      - name: 🔗 Prepare ViennaLS source (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          $viennalsTag = [regex]::Match($content, 'NAME\s+ViennaLS.*?GIT_TAG\s+(\S+)', [System.Text.RegularExpressions.RegexOptions]::Singleline).Groups[1].Value
          git ls-remote --tags --exit-code https://github.com/ViennaTools/ViennaLS.git $viennalsTag | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[CI] Tag $viennalsTag not found; cloning master as fallback"
            Remove-Item -Recurse -Force _viennals -ErrorAction SilentlyContinue
            git clone --depth 1 --branch master https://github.com/ViennaTools/ViennaLS.git _viennals
            if ($LASTEXITCODE -ne 0) { exit 1 }
            "CPM_ViennaLS_SOURCE=$((Get-Location).Path)/_viennals" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: 🖥️ Setup vcpkg (Windows)
        shell: pwsh
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue

          git clone https://github.com/microsoft/vcpkg.git
          git -C vcpkg checkout $env:VCPKG_COMMIT
          & .\vcpkg\bootstrap-vcpkg.bat

          "VCPKG_ROOT=$($env:GITHUB_WORKSPACE)\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          New-Item -ItemType Directory -Force -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"

      - name: 📋 Install MacOS Dependencies
        if: ${{ startsWith(matrix.os, 'macos-') }}
        run: brew install vtk embree tbb

      - name: 🦥 Cache vcpkg installed (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        id: vcpkg-installed-cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-installed-${{ matrix.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ matrix.os }}-${{ env.VCPKG_COMMIT }}-

      - name: 🛠️ Build Dependencies (Windows)
        if: ${{ matrix.os == 'windows-latest' && steps.vcpkg-installed-cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          ./vcpkg/vcpkg install --triplet x64-windows

      - name: 🏗️ Compile (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $cpmArgs = @()
          if ($env:CPM_ViennaLS_SOURCE) { $cpmArgs += "-DCPM_ViennaLS_SOURCE=$env:CPM_ViennaLS_SOURCE" }
          cmake -DVIENNAPS_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed -DVCPKG_MANIFEST_INSTALL=OFF @cpmArgs -B build
          cmake --build build --config Release --parallel
          cmake --build build --config Debug --parallel

      - name: 🏗️ Compile (other)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          cmake -DVIENNAPS_BUILD_TESTS=ON -DVIENNAPS_ENABLE_SANITIZER=ON ${CPM_ViennaLS_SOURCE:+-DCPM_ViennaLS_SOURCE="$CPM_ViennaLS_SOURCE"} -B build
          cmake --build build --config ${{ matrix.config }}

      - name: 🧪 Test
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          ctest --output-on-failure -E "Benchmark|Performance" -C ${{ matrix.config }} --test-dir build

      - name: 🧪 Test (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          ctest --output-on-failure -E "Benchmark|Performance" -C Release --test-dir build
          ctest --output-on-failure -E "Benchmark|Performance" -C Debug --test-dir build
